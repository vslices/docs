# Required
version: 2

# Set the OS, Python version, and other tools you might need
build:
  os: ubuntu-24.04
  tools:
    python: "3.11"

# Build documentation with Mkdocs
mkdocs:
  configuration: ${MKDOCS_CONFIG_FILE}
  
python:
  install:
    - requirements: requirements.txt
        