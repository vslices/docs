site_name: VSlices
site_description: Suite de ingeniería de software progresiva
site_author: VSlices
repo_url: https://github.com/vslices/docs
repo_name: vslices/docs

docs_dir: docs/es 

theme:
    name: readthedocs
    locale: es

plugins: 
    - search:
        lang: es
    - mermaid2:
        version: 10.0.2

nav:
    - Inicio: index.md

    - Cómo empezar:
        - Introducción: start-here/index.md
        - Qué es VSlices: start-here/what-is-vslices.md
        - Por qué VSlices existe: start-here/why-vslices-exists.md
        - Descripción de la suite: start-here/suite-overview.md
        - Caminos de adopción: start-here/adoption-paths.md

    - Productos:
        - Introducción: products/index.md
        - Glosario: products/glossary.md
        - VSlices Method:
            - Introducción: products/method/index.md
            - Glosario: products/method/glossary.md
            - Patrones:
                - Introducción: products/method/patterns/index.md
                - Modelo de colaboración: products/method/patterns/collaboration-model.md
                - Selección de modalidad: products/method/patterns/modality-selection.md
                - Cambio de modalidad: products/method/patterns/modality-switching.md
                - Bucle de aprendizaje: products/method/patterns/learning-loop.md

            - Guías de contexto:
                - Introducción: products/method/context-guides/index.md
                - Escenario "No digitalizado": products/method/context-guides/non-digitalized-scenario.md
                - Escenario "Digitalizado": products/method/context-guides/digitalized-scenario.md
                - Escenario "Unirse a un proyecto existente": products/method/context-guides/joining-existing-project.md
                - Escenario "Introducir Method en proyectos en curso": products/method/context-guides/introducing-method.md

            - Afinidad Documento-Etapa: products/method/document-stage-affinity.md

        - VSlices Design:
            - Introducción: products/design/index.md
            - Glosario: products/design/glossary.md
            - Principios: products/design/principles.md
            - Flujo de iteración: products/design/iteration-flow.md
            - Modalidades:
                - Context-first:
                    - Introducción: products/design/modalities/context-first/index.md
                    - Flujo de iteración: products/design/modalities/context-first/iteration-flow.md
                    - Riesgos y relaciones: products/design/modalities/context-first/risks-and-relations.md
                - Problem-first: 
                    - Introducción: products/design/modalities/problem-first/index.md
                    - Flujo de iteración: products/design/modalities/problem-first/iteration-flow.md
                    - Riesgos y relaciones: products/design/modalities/problem-first/risks-and-relations.md
                - Slice-first:
                    - Introducción: products/design/modalities/slice-first/index.md
                    - Flujo de iteración: products/design/modalities/slice-first/iteration-flow.md
                    - Riesgos y relaciones: products/design/modalities/slice-first/risks-and-relations.md
                - Comparaciones: products/design/modalities/comparisons.md
        
        - VSlices Docs Standard:
            - Introducción: products/docs-standard/index.md
            - Glosario: products/docs-standard/glossary.md
            - Cómo utilizar:
                - Principios: products/docs-standard/how-to-use/principles.md
                - Modelado: products/docs-standard/how-to-use/modeling.md
                - Reglas anti burocracia: products/docs-standard/how-to-use/anti-bureaucracy-rules.md
            - Taxonomía:
                - Introducción: products/docs-standard/taxonomy/index.md
                - Vocabulario de dominio: products/docs-standard/taxonomy/domain-vocabulary.md
                - Documento de contexto: products/docs-standard/taxonomy/context-document.md
                - Documento de proceso: products/docs-standard/taxonomy/process-document.md
                - Documento de caso de uso: products/docs-standard/taxonomy/use-case-document.md
                - Documento de capacidad: products/docs-standard/taxonomy/capability-document.md
                - Registro de decisión: products/docs-standard/taxonomy/decision-record.md
                - Nota de validación: products/docs-standard/taxonomy/validation-note.md
                - Nota de soporte: products/docs-standard/taxonomy/support-note.md
            - Continuidad: products/docs-standard/continuity-paths.md
            - Soporte de Compliance: products/docs-standard/compliance-support.md
        
        - VSlices Framework:
            - Introducción: products/framework/index.md
            - Glosario: products/framework/glossary.md

    - Alive lab: 
        - Overview: alive-lab/index.md
        - Glossary: alive-lab/glossary.md
        - Project stories:
            - Overview: alive-lab/project-stories/index.md
        - Field Notes:
            - Overview: alive-lab/field-notes/index.md
            - Human Factors:
                - Overview: alive-lab/field-notes/human-factors/index.md
                - Candles bring light even in the sun: alive-lab/field-notes/human-factors/candles-bring-light-even-in-the-sun.md
                - Self immolation through overcommitment: alive-lab/field-notes/human-factors/self-immolation-through-overcommitment.md
                - The organization you wish existed: alive-lab/field-notes/human-factors/the-organization-you-wish-existed.md
                - RAM limits in the human brain: alive-lab/field-notes/human-factors/ram-limits-in-the-human-brain.md
            - Organization factors:
                - Overview: alive-lab/field-notes/organization-factors/index.md
                - Wait.. Is that child drinking vodka?!: alive-lab/field-notes/organization-factors/wait-is-that-child-drinking-vodka.md
                - Why is there nothing?: alive-lab/field-notes/organization-factors/why-is-there-nothing.md
                - The human brain is not a database: alive-lab/field-notes/organization-factors/the-human-brain-is-not-a-database.md
            - Team factors:
                - Overview: alive-lab/field-notes/team-factors/index.md
                - All the power in those hands...: alive-lab/field-notes/team-factors/all-the-power-in-those-hands.md
                - Why aren't cookies in the jar anymore?: alive-lab/field-notes/team-factors/why-arent-cookies-in-the-jar-anymore.md
            - Direction: alive-lab/field-notes/direction.md
        - Theories:
            - Overview: alive-lab/theories/index.md
            - Relational surreal modeling:
                - Latest: alive-lab/theories/relational-surreal-modeling/v1.md
            - Knowledge geometry:
                - Latest:  alive-lab/theories/knowledge-geometry/v2.md
                - V1: alive-lab/theories/knowledge-geometry/v1.md
            - PResolver, a methodology for problem resolution:
                - Latest: alive-lab/theories/presolver/v1.md

    - Decisiones:
        - Introducción: decisions/index.md
        - Primera iteración:
            - Usar ReadTheDocs: decisions/first-iteration/0001-use-read-the-docs.md
            - Repositorio Documentation-first: decisions/first-iteration/0002-documentation-first-repository.md
            - Usar Domus Orbis como proyecto de validación: decisions/first-iteration/0003-use-domus-orbis-as-validation-project.md
            - Mantener los productos separados, pero conectados: decisions/first-iteration/0004-keep-products-separated-but-connected.md
            - Definición de soporte de lenguaje de primera clase: decisions/first-iteration/0005-first-class-language-support-definition.md
            - PResolver como abstracción de VSlices: decisions/first-iteration/0006-presolver-as-an-abstraction-from-vslices.md
            - Usar un proyecto de compañía de seguros como caso de adaptación: decisions/first-iteration/0007-use-insurance-company-project-as-adoption-case.md
            - Usar generación de plantillas como ejemplo de Slice-First: decisions/first-iteration/0008-use-template-generation-as-slice-first-sample.md
            - Finalizar Method antes de expandir documentos de Framework: decisions/first-iteration/0009-finish-method-before-expanding-framework-docs.md
